name: trinity_shell
description: Trinity AGI Universal Command Center - A blank canvas shell powered by OpenClaw.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  web_socket_channel: ^3.0.1
  speech_to_text: ^7.0.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  flutter_markdown: ^0.7.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  fonts:
    # --- Monospace fonts ---
    - family: IBMPlexMono
      fonts:
        - asset: fonts/IBMPlexMono-Regular.ttf
        - asset: fonts/IBMPlexMono-Bold.ttf
          weight: 700
        - asset: fonts/IBMPlexMono-Italic.ttf
          style: italic
    - family: JetBrainsMono
      fonts:
        - asset: fonts/JetBrainsMono-Regular.ttf
        - asset: fonts/JetBrainsMono-Bold.ttf
          weight: 700
        - asset: fonts/JetBrainsMono-Italic.ttf
          style: italic
    - family: Monofur
      fonts:
        - asset: fonts/monofur-Regular.ttf
        - asset: fonts/monofur-Bold.ttf
          weight: 700
    # --- Sans-serif fonts ---
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
        - asset: fonts/Inter-Bold.ttf
          weight: 700
        - asset: fonts/Inter-Italic.ttf
          style: italic
    - family: GeistSans
      fonts:
        - asset: fonts/Geist-Regular.ttf
        - asset: fonts/Geist-Bold.ttf
          weight: 700
        - asset: fonts/Geist-RegularItalic.ttf
          style: italic
