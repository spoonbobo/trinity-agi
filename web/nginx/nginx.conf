worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream openclaw {
        server openclaw-gateway:18789;
    }

    upstream terminal_proxy {
        server terminal-proxy:18790;
    }

    upstream auth_service {
        server auth-service:18791;
    }

    upstream supabase_auth {
        server supabase-auth:9999;
    }

    upstream keycloak_server {
        server keycloak:8080;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Flutter web app (SPA fallback)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ─── Auth Service API ────────────────────────────────────
        location /auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Supabase GoTrue (Auth) ─────────────────────────────
        location /supabase/auth/ {
            rewrite ^/supabase/auth/(.*)$ /$1 break;
            proxy_pass http://supabase_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Keycloak ───────────────────────────────────────────
        location /keycloak/ {
            proxy_pass http://keycloak_server/keycloak/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # ─── WebSocket proxy to OpenClaw gateway ────────────────
        location /ws {
            proxy_pass http://openclaw;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ─── Terminal WebSocket proxy ───────────────────────────
        location /terminal/ {
            proxy_pass http://terminal_proxy;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ─── OpenClaw Canvas + A2UI host ────────────────────────
        location /__openclaw__/ {
            proxy_pass http://openclaw;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # ─── OpenClaw HTTP APIs ─────────────────────────────────
        location /v1/ {
            proxy_pass http://openclaw;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /tools/ {
            proxy_pass http://openclaw;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
