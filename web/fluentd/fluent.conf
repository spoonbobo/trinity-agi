<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<filter trinity.**>
  @type parser
  key_name log
  reserve_data true
  <parse>
    @type json
  </parse>
</filter>

<match trinity.**>
  @type http
  endpoint http://loki:3100/loki/api/v1/push
  content_type application/json
  <buffer>
    @type file
    path /fluentd/buffer/http
    flush_mode interval
    flush_interval 10s
  </buffer>
</match>
