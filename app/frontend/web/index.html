<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Trinity - Universal Command Center">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Trinity</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: #0a0a0a;
      overflow: hidden;
    }
    /* #7: Loading spinner shown during Flutter boot, auto-removed */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    #loading svg {
      width: 28px;
      height: 28px;
    }
    #loading span {
      font-family: monospace;
      font-size: 11px;
      color: #333;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <svg viewBox="0 0 32 32">
      <path d="M16 3 C16 10 10 16 3 16 C10 16 16 22 16 29 C16 22 22 16 29 16 C22 16 16 10 16 3Z" fill="#6EE7B7">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite"/>
      </path>
    </svg>
    <span>TRINITY</span>
  </div>
  <script>
    // Unregister any previously-installed Flutter service worker.
    // The build no longer generates one (--pwa-strategy=none), but existing
    // users may still have a stale SW cached in their browser that intercepts
    // fetches and serves outdated assets. This is a one-time cleanup.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var r of registrations) { r.unregister(); }
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
