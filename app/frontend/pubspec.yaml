name: trinity_shell
description: Trinity AGI Universal Command Center - A blank canvas shell powered by OpenClaw.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  web_socket_channel: ^3.0.1
  speech_to_text: ^7.0.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  flutter_markdown: ^0.7.6
  pointer_interceptor: ^0.10.1
  xterm: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  fonts:
    - family: DMSans
      fonts:
        - asset: fonts/DMSans-Variable.ttf
        - asset: fonts/DMSans-Italic-Variable.ttf
          style: italic
    # --- Monospace used for terminal/code surfaces ---
    - family: JetBrainsMono
      fonts:
        - asset: fonts/JetBrainsMono-Regular.ttf
        - asset: fonts/JetBrainsMono-Bold.ttf
          weight: 700
        - asset: fonts/JetBrainsMono-Italic.ttf
          style: italic
    # --- CJK + symbol fallback fonts ---
    - family: NotoSansSC
      fonts:
        - asset: fonts/NotoSansSC-Regular.otf
    - family: NotoSansTC
      fonts:
        - asset: fonts/NotoSansTC-Regular.otf
    - family: NotoSans
      fonts:
        - asset: fonts/NotoSans-Regular.ttf
