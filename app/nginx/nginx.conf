worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip compression (including wasm, woff2, svg)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/wasm font/woff2
               image/svg+xml application/x-font-ttf;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # Use Docker's embedded DNS so upstream IPs are re-resolved
    # after container restarts (prevents stale-IP 502 errors).
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    upstream openclaw {
        server openclaw-gateway:18789;
    }

    upstream terminal_proxy {
        server terminal-proxy:18790;
    }

    upstream copilot_service {
        server copilot:18802;
    }

    upstream openclaw_browser {
        server openclaw-gateway:18793;
    }

    upstream supabase_auth {
        server supabase-auth:9999;
    }

    upstream keycloak_server {
        server keycloak:8080;
    }

    # ─── Shared security headers (included in each location) ─────────
    # Using a map to avoid nginx's header inheritance issues where
    # add_header in a location block replaces server-level headers.

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ─── Security Headers (server level) ──────────────────────
        # NOTE: These are inherited by location blocks that do NOT
        # have their own add_header directives. Location blocks that
        # add headers must repeat these.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        # X-XSS-Protection is deprecated; rely on CSP instead
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;
        # Enable HSTS (safe even without TLS -- browsers only enforce over HTTPS)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ─── Flutter SPA entry (no-cache for index.html) ─────────
        location / {
            try_files $uri $uri/ /index.html;
            # Repeat security headers since add_header overrides parent
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        # ─── Flutter bootstrap/runtime files (no-cache) ───────────
        location ~* ^/(index\.html|flutter\.js|main\.dart\.js|flutter_bootstrap\.js|flutter_service_worker\.js|version\.json)$ {
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            try_files $uri =404;
        }

        # ─── Content-hashed assets (long-lived cache) ────────────
        location ~* \.(js|wasm|map)$ {
            add_header X-Content-Type-Options "nosniff" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # ─── Fonts & static assets (long-lived cache) ────────────
        location ~* \.(ttf|otf|woff|woff2|eot|svg|png|jpg|ico)$ {
            add_header X-Content-Type-Options "nosniff" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # ─── Auth Service API (rate limited) ──────────────────────
        location /auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            set $auth_backend http://auth-service:18791;
            proxy_pass $auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Supabase GoTrue (Auth) ─────────────────────────────
        location /supabase/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            rewrite ^/supabase/auth/(.*)$ /$1 break;
            proxy_pass http://supabase_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Keycloak ───────────────────────────────────────────
        location /keycloak/ {
            proxy_pass http://keycloak_server/keycloak/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # ─── WebSocket proxy to OpenClaw gateway ────────────────
        location /ws {
            limit_conn ws_conn 50;
            proxy_pass http://openclaw;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ─── Terminal WebSocket proxy ───────────────────────────
        location /terminal/ {
            limit_conn ws_conn 20;
            proxy_pass http://terminal_proxy;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location ^~ /copilot/ {
            limit_req zone=api_limit burst=30 nodelay;
            rewrite ^/copilot(/.*)$ $1 break;
            proxy_pass http://copilot_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Browser screenshots (served directly from shared volume) ───
        # Screenshots saved by the browser control API are stored in the
        # openclaw-data volume under media/browser/. Serve them directly
        # via nginx (read-only mount) to avoid gateway routing issues.
        location ^~ /__openclaw__/browser-media/ {
            alias /openclaw-data/media/browser/;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Cache-Control "no-cache";
            types {
                image/png png;
                image/jpeg jpg jpeg;
            }
            default_type application/octet-stream;
        }

        # ─── OpenClaw Browser Control API ──────────────────────
        # The browser control service binds to loopback:18791 inside the
        # gateway container. A socat bridge (bootstrap-openclaw.sh) forwards
        # 0.0.0.0:18793 -> 127.0.0.1:18791 so nginx can reach it.
        # Port 18792 is reserved for Chrome extension relay.
        location ^~ /__openclaw__/browser/ {
            limit_req zone=api_limit burst=50 nodelay;
            set $browser_ctl http://openclaw-gateway:18793;
            rewrite ^/__openclaw__/browser(/.*)?$ $1 break;
            proxy_pass $browser_ctl;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Workspace media (images generated by skills, scripts, etc.) ───
        # Serves files from the agent workspace via the openclaw-data volume.
        # Must appear before the generic /__openclaw__/ proxy block.
        location ^~ /__openclaw__/media/ {
            alias /openclaw-data/workspace/;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Cache-Control "no-cache";
            types {
                image/png  png;
                image/jpeg jpg jpeg;
                image/gif  gif;
                image/webp webp;
                image/svg+xml svg;
            }
            default_type application/octet-stream;
        }

        # ─── OpenClaw Canvas + A2UI host + file upload ─────────
        # ^~ ensures this prefix takes priority over regex locations
        # (e.g., ~* \.(png|jpg)$ would otherwise intercept media requests)
        location ^~ /__openclaw__/ {
            limit_req zone=api_limit burst=50 nodelay;
            client_max_body_size 5m;
            proxy_pass http://openclaw;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ─── OpenClaw HTTP APIs (rate limited) ───────────────────
        location /v1/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://openclaw;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /tools/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://openclaw;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
