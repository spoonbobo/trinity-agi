{{- if and .Values.site.enabled .Values.ingress.enabled .Values.site.host }}
# ─── Marketing Site Ingress (separate subdomain) ──────────────────────────
# In production, routes site.host (e.g., www.trinity.ai) to the site service.
# Locally the site uses a NodePort service instead -- access via:
#   minikube service site -n <namespace> --url
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trinity-site-ingress
  namespace: {{ include "trinity.namespace" . }}
  labels:
    {{- include "trinity.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.annotations }}
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.site.host | quote }}
      secretName: {{ .Values.site.tlsSecretName | default "trinity-site-tls" | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.site.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: site
                port:
                  name: http
{{- end }}
