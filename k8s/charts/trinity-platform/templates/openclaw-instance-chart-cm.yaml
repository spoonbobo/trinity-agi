# ─── OpenClaw Instance Chart (bundled for gateway-orchestrator) ────────────
# The gateway-orchestrator renders this Helm chart to deploy per-user
# OpenClaw pods. We embed all chart files as a ConfigMap so the orchestrator
# can read them from its mounted volume.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-instance-chart
  namespace: {{ include "trinity.namespace" . }}
  labels:
    {{- include "trinity.labels" . | nindent 4 }}
data:
  Chart.yaml: |
    apiVersion: v2
    name: openclaw-instance
    description: Per-user OpenClaw gateway instance (Deployment, Service, PVC)
    type: application
    version: 0.1.0
    appVersion: "2026.3.0"
    keywords:
      - openclaw
      - gateway
      - per-user
    maintainers:
      - name: Trinity AGI

  values.yaml: |
    userId: ""
    gatewayToken: ""
    namespace: trinity
    image: openclaw:trinity
    imageRegistry: ""
    imagePullPolicy: IfNotPresent
    storageClass: ""
    storageSize: 5Gi
    port: 18789
    resources:
      limits:
        memory: 2Gi
      requests:
        memory: 1Gi
        cpu: 500m
    shmSize: 2Gi
    extraLabels: {}
    extraEnv: []

  _helpers.tpl: |
    {{`{{- define "openclaw.name" -}}`}}
    {{`openclaw-{{ .Values.userId | trunc 12 }}`}}
    {{`{{- end }}`}}

    {{`{{- define "openclaw.labels" -}}`}}
    {{`app.kubernetes.io/name: openclaw-instance`}}
    {{`app.kubernetes.io/instance: {{ include "openclaw.name" . }}`}}
    {{`app.kubernetes.io/managed-by: gateway-orchestrator`}}
    {{`app.kubernetes.io/part-of: trinity-platform`}}
    {{`trinity.work/user-id: {{ .Values.userId | quote }}`}}
    {{`{{- range $key, $val := .Values.extraLabels }}`}}
    {{`{{ $key }}: {{ $val | quote }}`}}
    {{`{{- end }}`}}
    {{`{{- end }}`}}

    {{`{{- define "openclaw.selectorLabels" -}}`}}
    {{`app.kubernetes.io/name: openclaw-instance`}}
    {{`app.kubernetes.io/instance: {{ include "openclaw.name" . }}`}}
    {{`{{- end }}`}}

    {{`{{- define "openclaw.image" -}}`}}
    {{`{{- if .Values.imageRegistry -}}`}}
    {{`{{ .Values.imageRegistry }}{{ .Values.image }}`}}
    {{`{{- else -}}`}}
    {{`{{ .Values.image }}`}}
    {{`{{- end -}}`}}
    {{`{{- end }}`}}

  configmap.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: {{`{{ include "openclaw.name" . }}`}}-config
      namespace: {{`{{ .Values.namespace }}`}}
      labels:
        {{`{{- include "openclaw.labels" . | nindent 4 }}`}}
    data:
      openclaw.json: |
        {
          "gateway": {
            "port": {{`{{ .Values.port }}`}},
            "mode": "local",
            "bind": "lan",
            "controlUi": {
              "dangerouslyAllowHostHeaderOriginFallback": true,
              "dangerouslyDisableDeviceAuth": true
            },
            "auth": {
              "mode": "token"
            }
          },
          "agents": {
            "defaults": {
              "workspace": "/home/node/.openclaw/workspace",
              "sandbox": {
                "mode": "off",
                "scope": "agent"
              }
            }
          },
          "tools": {
            "profile": "full",
            "web": {
              "search": { "enabled": true },
              "fetch": { "enabled": true }
            }
          },
          "browser": {
            "enabled": true,
            "headless": true,
            "noSandbox": true
          }
        }

  deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: {{`{{ include "openclaw.name" . }}`}}
      namespace: {{`{{ .Values.namespace }}`}}
      labels:
        {{`{{- include "openclaw.labels" . | nindent 4 }}`}}
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          {{`{{- include "openclaw.selectorLabels" . | nindent 6 }}`}}
      template:
        metadata:
          labels:
            {{`{{- include "openclaw.labels" . | nindent 8 }}`}}
        spec:
          containers:
            - name: openclaw
              image: {{`{{ include "openclaw.image" . }}`}}
              imagePullPolicy: {{`{{ .Values.imagePullPolicy }}`}}
              command:
                - openclaw
                - gateway
                - "--port"
                - {{`{{ .Values.port | quote }}`}}
                - "--bind"
                - "lan"
              ports:
                - containerPort: {{`{{ .Values.port }}`}}
                  name: gateway
                - containerPort: 18793
                  name: opencode-api
              env:
                - name: OPENCLAW_GATEWAY_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{`{{ include "openclaw.name" . }}`}}-token
                      key: token
                - name: NODE_ENV
                  value: "production"
                {{`{{- range .Values.extraEnv }}`}}
                - name: {{`{{ .name }}`}}
                  value: {{`{{ .value | quote }}`}}
                {{`{{- end }}`}}
              volumeMounts:
                - name: data
                  mountPath: /home/node/.openclaw
                - name: config
                  mountPath: /home/node/.openclaw/openclaw.json
                  subPath: openclaw.json
                  readOnly: true
                - name: dshm
                  mountPath: /dev/shm
              livenessProbe:
                httpGet:
                  path: /healthz
                  port: gateway
                initialDelaySeconds: 30
                periodSeconds: 30
                timeoutSeconds: 10
              readinessProbe:
                httpGet:
                  path: /readyz
                  port: gateway
                initialDelaySeconds: 15
                periodSeconds: 15
                timeoutSeconds: 10
              resources:
                {{`{{- toYaml .Values.resources | nindent 12 }}`}}
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: {{`{{ include "openclaw.name" . }}`}}-data
            - name: config
              configMap:
                name: {{`{{ include "openclaw.name" . }}`}}-config
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: {{`{{ .Values.shmSize }}`}}

  pvc.yaml: |
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: {{`{{ include "openclaw.name" . }}`}}-data
      namespace: {{`{{ .Values.namespace }}`}}
      labels:
        {{`{{- include "openclaw.labels" . | nindent 4 }}`}}
    spec:
      accessModes: ["ReadWriteOnce"]
      {{`{{- if .Values.storageClass }}`}}
      storageClassName: {{`{{ .Values.storageClass }}`}}
      {{`{{- end }}`}}
      resources:
        requests:
          storage: {{`{{ .Values.storageSize }}`}}

  secret.yaml: |
    apiVersion: v1
    kind: Secret
    metadata:
      name: {{`{{ include "openclaw.name" . }}`}}-token
      namespace: {{`{{ .Values.namespace }}`}}
      labels:
        {{`{{- include "openclaw.labels" . | nindent 4 }}`}}
    type: Opaque
    stringData:
      token: {{`{{ .Values.gatewayToken | quote }}`}}

  service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: {{`{{ include "openclaw.name" . }}`}}
      namespace: {{`{{ .Values.namespace }}`}}
      labels:
        {{`{{- include "openclaw.labels" . | nindent 4 }}`}}
    spec:
      type: ClusterIP
      ports:
        - port: {{`{{ .Values.port }}`}}
          targetPort: gateway
          name: gateway
        - port: 18793
          targetPort: opencode-api
          name: opencode-api
      selector:
        {{`{{- include "openclaw.selectorLabels" . | nindent 4 }}`}}
