apiVersion: v1
kind: Secret
metadata:
  name: trinity-secrets
  namespace: {{ include "trinity.namespace" . }}
  labels:
    {{- include "trinity.labels" . | nindent 4 }}
type: Opaque
stringData:
  SUPABASE_JWT_SECRET: {{ .Values.secrets.supabaseJwtSecret | quote }}
  SUPABASE_ANON_KEY: {{ .Values.secrets.supabaseAnonKey | quote }}
  SUPABASE_POSTGRES_PASSWORD: {{ .Values.secrets.supabasePostgresPassword | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.secrets.keycloakAdminPassword | quote }}
  KEYCLOAK_CLIENT_SECRET: {{ .Values.secrets.keycloakClientSecret | quote }}
  GRAFANA_PASSWORD: {{ .Values.secrets.grafanaPassword | quote }}
  VAULT_TOKEN: {{ .Values.secrets.vaultToken | quote }}
  ORCHESTRATOR_SERVICE_TOKEN: {{ .Values.secrets.orchestratorServiceToken | quote }}
  ZEN_API_KEY: {{ .Values.secrets.zenApiKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: trinity-superadmin
  namespace: {{ include "trinity.namespace" . }}
  labels:
    {{- include "trinity.labels" . | nindent 4 }}
type: Opaque
stringData:
  SUPERADMIN_ALLOWLIST: {{ .Values.superadmin.allowlist | quote }}
  ENABLE_DEFAULT_SUPERADMIN: {{ .Values.superadmin.enabled | quote }}
  DEFAULT_SUPERADMIN_EMAIL: {{ .Values.superadmin.email | quote }}
  DEFAULT_SUPERADMIN_PASSWORD: {{ .Values.superadmin.password | quote }}
