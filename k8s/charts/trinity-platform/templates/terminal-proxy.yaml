# ─── Terminal Proxy (kubectl exec into per-user pods) ──────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terminal-proxy
  namespace: {{ include "trinity.namespace" . }}
  labels:
    {{- include "trinity.componentLabels" (dict "component" "terminal-proxy" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "trinity.selectorLabels" (dict "component" "terminal-proxy") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "trinity.componentLabels" (dict "component" "terminal-proxy" "Release" .Release "Chart" .Chart) | nindent 8 }}
      {{- if .Values.vault.agentInjector.enabled }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.agentInjector.role | quote }}
        vault.hashicorp.com/agent-inject-secret-jwt: "secret/data/trinity/jwt"
        vault.hashicorp.com/agent-inject-secret-orchestrator: "secret/data/trinity/orchestrator"
      {{- end }}
    spec:
      serviceAccountName: terminal-proxy
      containers:
        - name: terminal-proxy
          image: {{ include "trinity.image" (dict "image" .Values.terminalProxy.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.terminalProxy.port }}
              name: http
          env:
            - name: TERMINAL_PROXY_PORT
              value: {{ .Values.terminalProxy.port | quote }}
            # Required by startup validation (unused in kubectl mode; per-user tokens come from orchestrator)
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: trinity-secrets
                  key: ORCHESTRATOR_SERVICE_TOKEN
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: trinity-secrets
                  key: SUPABASE_JWT_SECRET
            - name: ALLOWED_ORIGINS
              value: {{ .Values.urls.allowedOrigins | quote }}
            # Orchestrator for resolving user -> pod
            - name: ORCHESTRATOR_URL
              value: "http://gateway-orchestrator:{{ .Values.gatewayOrchestrator.port }}"
            - name: ORCHESTRATOR_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: trinity-secrets
                  key: ORCHESTRATOR_SERVICE_TOKEN
            - name: NAMESPACE
              value: {{ include "trinity.namespace" . }}
            # Execution mode: "kubectl" (K8s) instead of "docker" (legacy)
            - name: EXEC_MODE
              value: "kubectl"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.terminalProxy.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: terminal-proxy
  namespace: {{ include "trinity.namespace" . }}
  labels:
    {{- include "trinity.componentLabels" (dict "component" "terminal-proxy" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.terminalProxy.port }}
      targetPort: http
      name: http
  selector:
    {{- include "trinity.selectorLabels" (dict "component" "terminal-proxy") | nindent 4 }}
