# ─── Auth Service (JWT verify + RBAC resolution) ──────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: {{ include "trinity.namespace" . }}
  labels:
    {{- include "trinity.componentLabels" (dict "component" "auth-service" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "trinity.selectorLabels" (dict "component" "auth-service") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "trinity.componentLabels" (dict "component" "auth-service" "Release" .Release "Chart" .Chart) | nindent 8 }}
      {{- if .Values.vault.agentInjector.enabled }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.agentInjector.role | quote }}
        vault.hashicorp.com/agent-inject-secret-supabase: "secret/data/trinity/supabase"
        vault.hashicorp.com/agent-inject-secret-orchestrator: "secret/data/trinity/orchestrator"
      {{- end }}
    spec:
      containers:
        - name: auth-service
          image: {{ include "trinity.image" (dict "image" .Values.authService.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.authService.port }}
              name: http
          env:
            - name: AUTH_SERVICE_PORT
              value: {{ .Values.authService.port | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: trinity-secrets
                  key: SUPABASE_JWT_SECRET
            - name: SUPABASE_AUTH_URL
              value: "http://supabase-auth:9999"
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: trinity-secrets
                  key: SUPABASE_ANON_KEY
            - name: ALLOWED_ORIGINS
              value: {{ .Values.urls.allowedOrigins | quote }}
            - name: ENABLE_DEFAULT_SUPERADMIN
              valueFrom:
                secretKeyRef:
                  name: trinity-superadmin
                  key: ENABLE_DEFAULT_SUPERADMIN
            - name: DEFAULT_SUPERADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: trinity-superadmin
                  key: DEFAULT_SUPERADMIN_EMAIL
            - name: DEFAULT_SUPERADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trinity-superadmin
                  key: DEFAULT_SUPERADMIN_PASSWORD
            - name: POSTGRES_HOST
              value: "supabase-db"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "supabase"
            - name: POSTGRES_USER
              value: "supabase_admin"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trinity-secrets
                  key: SUPABASE_POSTGRES_PASSWORD
            - name: SUPERADMIN_ALLOWLIST
              valueFrom:
                secretKeyRef:
                  name: trinity-superadmin
                  key: SUPERADMIN_ALLOWLIST
            # Orchestrator URL for per-user gateway provisioning
            - name: ORCHESTRATOR_URL
              value: "http://gateway-orchestrator:{{ .Values.gatewayOrchestrator.port }}"
            - name: ORCHESTRATOR_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: trinity-secrets
                  key: ORCHESTRATOR_SERVICE_TOKEN
            - name: LIGHTRAG_URL
              value: "http://lightrag:{{ .Values.lightrag.port }}"
            - name: LIGHTRAG_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: trinity-secrets
                  key: LIGHTRAG_INTERNAL_TOKEN
          livenessProbe:
            httpGet:
              path: /auth/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /auth/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.authService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: {{ include "trinity.namespace" . }}
  labels:
    {{- include "trinity.componentLabels" (dict "component" "auth-service" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.authService.port }}
      targetPort: http
      name: http
  selector:
    {{- include "trinity.selectorLabels" (dict "component" "auth-service") | nindent 4 }}
