# ─── Gateway Proxy (routes users to per-user OpenClaw pods) ────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-proxy
  namespace: {{ include "trinity.namespace" . }}
  labels:
    {{- include "trinity.componentLabels" (dict "component" "gateway-proxy" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  replicas: {{ .Values.gatewayProxy.replicas }}
  selector:
    matchLabels:
      {{- include "trinity.selectorLabels" (dict "component" "gateway-proxy") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "trinity.componentLabels" (dict "component" "gateway-proxy" "Release" .Release "Chart" .Chart) | nindent 8 }}
      {{- if .Values.vault.agentInjector.enabled }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.agentInjector.role | quote }}
        vault.hashicorp.com/agent-inject-secret-jwt: "secret/data/trinity/jwt"
        vault.hashicorp.com/agent-inject-secret-orchestrator: "secret/data/trinity/orchestrator"
      {{- end }}
    spec:
      containers:
        - name: gateway-proxy
          image: {{ include "trinity.image" (dict "image" .Values.gatewayProxy.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.gatewayProxy.port }}
              name: http
          env:
            - name: PORT
              value: {{ .Values.gatewayProxy.port | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: trinity-secrets
                  key: SUPABASE_JWT_SECRET
            - name: ORCHESTRATOR_URL
              value: "http://gateway-orchestrator:{{ .Values.gatewayOrchestrator.port }}"
            - name: ORCHESTRATOR_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: trinity-secrets
                  key: ORCHESTRATOR_SERVICE_TOKEN
            - name: RESOLVER_CACHE_TTL
              value: {{ .Values.gatewayProxy.resolverCacheTTL | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.gatewayProxy.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-proxy
  namespace: {{ include "trinity.namespace" . }}
  labels:
    {{- include "trinity.componentLabels" (dict "component" "gateway-proxy" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.gatewayProxy.port }}
      targetPort: http
      name: http
  selector:
    {{- include "trinity.selectorLabels" (dict "component" "gateway-proxy") | nindent 4 }}
---
# HPA for gateway-proxy (handles all user WebSocket connections)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-proxy
  namespace: {{ include "trinity.namespace" . }}
  labels:
    {{- include "trinity.componentLabels" (dict "component" "gateway-proxy" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway-proxy
  minReplicas: {{ .Values.gatewayProxy.replicas }}
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
