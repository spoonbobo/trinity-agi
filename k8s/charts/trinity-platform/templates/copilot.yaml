# ─── Copilot (OpenCode-backed superadmin assistant) ────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copilot
  namespace: {{ include "trinity.namespace" . }}
  labels:
    {{- include "trinity.componentLabels" (dict "component" "copilot" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  replicas: {{ .Values.copilot.replicas }}
  selector:
    matchLabels:
      {{- include "trinity.selectorLabels" (dict "component" "copilot") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "trinity.componentLabels" (dict "component" "copilot" "Release" .Release "Chart" .Chart) | nindent 8 }}
    spec:
      containers:
        - name: copilot
          image: {{ include "trinity.image" (dict "image" .Values.copilot.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.copilot.port }}
              name: http
          env:
            - name: COPILOT_PORT
              value: {{ .Values.copilot.port | quote }}
            - name: OPENCODE_PORT
              value: {{ .Values.copilot.opencodePort | quote }}
            - name: COPILOT_DEFAULT_MODEL
              value: {{ .Values.copilot.defaultModel | quote }}
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:{{ .Values.authService.port }}"
            - name: ALLOWED_ORIGINS
              value: {{ .Values.urls.allowedOrigins | quote }}
            - name: ZEN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: trinity-secrets
                  key: ZEN_API_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.copilot.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: copilot
  namespace: {{ include "trinity.namespace" . }}
  labels:
    {{- include "trinity.componentLabels" (dict "component" "copilot" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.copilot.port }}
      targetPort: http
      name: http
  selector:
    {{- include "trinity.selectorLabels" (dict "component" "copilot") | nindent 4 }}
