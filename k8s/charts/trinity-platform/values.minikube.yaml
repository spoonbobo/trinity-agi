# Minikube overlay -- minimal resources, dev secrets, single replicas
global:
  namespace: trinity
  imagePullPolicy: IfNotPresent
  storageClass: standard

# ─── Secrets ──────────────────────────────────────────────────────────────
# Do NOT commit real secrets here. For local dev, run:
#   ./k8s/seed-dev-secrets.sh --port-forward
# to populate Vault, then helm upgrade triggers vault-sync.
#
# For first install only (bootstrap), pass via --set or use the seed script.
# After vault-init + vault-sync run, these are overwritten from Vault.
secrets:
  supabaseJwtSecret: "trinity-dev-jwt-secret-at-least-32-chars-long!!"
  supabaseAnonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlLWRlbW8iLCJpYXQiOjE3MDk0MDAwMDAsImV4cCI6MTg2NzA4MDAwMH0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE"
  supabasePostgresPassword: "trinity-pg-password-123"
  keycloakAdminPassword: "trinity-kc-admin-123"
  keycloakClientSecret: "trinity-kc-client-secret-123"
  grafanaPassword: "trinity-grafana-123"
  vaultToken: "root"
  orchestratorServiceToken: "trinity-orchestrator-token-123"
  zenApiKey: ""
  delegationJwtSecret: "trinity-delegation-jwt-secret-dev-1234567890"
  lightragInternalToken: "trinity-lightrag-internal-token-123"
  lightragLlmApiKey: ""
  lightragEmbeddingApiKey: ""
  poeApiKey: ""
  braveApiKey: ""
  authentikClientSecret: ""

urls:
  apiExternalUrl: "http://localhost"
  siteUrl: "http://localhost"
  allowedOrigins: "http://localhost"

# Superadmin bootstrap (for first install; overwritten by vault-sync after)
superadmin:
  enabled: true
  email: "admin@trinity.work"
  password: "admin123"

vault:
  devMode: true
  uiEnabled: true
  storage: 1Gi
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi
      cpu: 50m

supabaseDb:
  storage: 2Gi
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi
      cpu: 100m

supabaseAuth:
  resources:
    limits:
      memory: 128Mi
    requests:
      memory: 64Mi
      cpu: 50m

keycloak:
  resources:
    limits:
      memory: 768Mi
    requests:
      memory: 384Mi
      cpu: 100m

authService:
  resources:
    limits:
      memory: 128Mi
    requests:
      memory: 64Mi
      cpu: 50m

openshellBridge:
  sandboxEndpointPattern: "http://host.docker.internal:18789"
  gatewayEndpoint: "https://host.docker.internal:8080"
  resources:
    limits:
      memory: 128Mi
    requests:
      memory: 64Mi
      cpu: 50m

lightrag:
  enabled: true
  replicas: 1
  llmModel: "Claude-Sonnet-4.5"
  llmBaseUrl: "https://api.poe.com/v1"
  embeddingModel: "BAAI/bge-m3"
  embeddingBaseUrl: "https://api.deepinfra.com/v1/openai"
  embeddingDim: 1024
  embeddingMaxTokens: 8192
  defaultQueryMode: "hybrid"
  enableRerank: true
  storage: 2Gi
  resources:
    limits:
      memory: 3Gi
      cpu: "2"
    requests:
      memory: 1Gi
      cpu: "2"

ingress:
  enabled: true
  className: nginx
  host: ""

extraIngresses:
  - name: vault
    enabled: true
    host: vault.localhost
    path: /
    pathType: Prefix
    serviceName: vault
    servicePort: 8200
  - name: grafana
    enabled: true
    host: grafana.localhost
    path: /
    pathType: Prefix
    serviceName: grafana
    servicePort: 3000
  - name: loki
    enabled: true
    host: loki.localhost
    path: /
    pathType: Prefix
    serviceName: loki
    servicePort: 3100
  - name: lightrag
    enabled: true
    host: lightrag.localhost
    path: /
    pathType: Prefix
    serviceName: lightrag
    servicePort: 18803
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-body-size: "10m"

nginx:
  enabled: true
  replicas: 1
  resources:
    limits:
      memory: 64Mi
    requests:
      memory: 32Mi
      cpu: 25m

loki:
  enabled: true
  storage: 1Gi
  resources:
    limits:
      memory: 256Mi
    requests:
      memory: 128Mi
      cpu: 50m

grafana:
  enabled: true
  storage: 1Gi
  resources:
    limits:
      memory: 128Mi
    requests:
      memory: 64Mi
      cpu: 50m

site:
  enabled: true
  host: site.localhost
  resources:
    limits:
      memory: 128Mi
    requests:
      memory: 64Mi
      cpu: 25m

fluentd:
  enabled: true
  resources:
    limits:
      memory: 128Mi
    requests:
      memory: 64Mi
      cpu: 25m
