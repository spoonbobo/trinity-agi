# Per-user OpenClaw instance values.
# These are set programmatically by the gateway-orchestrator when provisioning.
# Do not install this chart manually -- the orchestrator manages lifecycle.

# ─── Required (set by orchestrator) ───────────────────────────────────────
userId: ""
gatewayToken: ""

# ─── Optional overrides ──────────────────────────────────────────────────
namespace: trinity
image: openclaw:local
imageRegistry: ""
imagePullPolicy: IfNotPresent
storageClass: ""
storageSize: 5Gi
port: 18789

# Resource limits per user gateway
resources:
  limits:
    memory: 2Gi
  requests:
    memory: 1Gi
    cpu: 500m

# Shared memory for browser automation
shmSize: 2Gi

# Labels added to all resources (for filtering/querying)
extraLabels: {}

# Extra environment variables (e.g., API keys for the user's gateway)
extraEnv: []
