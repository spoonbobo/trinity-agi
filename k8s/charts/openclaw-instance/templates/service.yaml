# Per-user OpenClaw gateway Service (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.port }}
      targetPort: gateway
      name: gateway
    - port: 18793
      targetPort: 18793
      name: browser-ctl
  selector:
    {{- include "openclaw.selectorLabels" . | nindent 4 }}
