# Per-user OpenClaw gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "openclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openclaw.labels" . | nindent 8 }}
    spec:
      initContainers:
        - name: init-openclaw-config
          image: {{ include "openclaw.image" . }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command:
            - /bin/sh
            - -lc
            - |
              if [ -f /home/node/.openclaw/openclaw.json ] && [ ! -w /home/node/.openclaw/openclaw.json ]; then
                rm -f /home/node/.openclaw/openclaw.json
              fi
              if [ ! -f /home/node/.openclaw/openclaw.json ]; then
                cp /etc/openclaw-config/openclaw.json /home/node/.openclaw/openclaw.json
              fi
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
            - name: config-src
              mountPath: /etc/openclaw-config
              readOnly: true
      containers:
        - name: openclaw
          image: {{ include "openclaw.image" . }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command:
            - openclaw
            - gateway
            - "--port"
            - {{ .Values.port | quote }}
            - "--bind"
            - "lan"
          ports:
            - containerPort: {{ .Values.port }}
              name: gateway
            - containerPort: 18793
              name: browser-ctl
          env:
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.name" . }}-token
                  key: token
            - name: NODE_ENV
              value: "production"
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
            - name: config-src
              mountPath: /etc/openclaw-config
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
          livenessProbe:
            httpGet:
              path: /healthz
              port: gateway
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: gateway
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "openclaw.name" . }}-data
        - name: config-src
          configMap:
            name: {{ include "openclaw.name" . }}-config
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.shmSize }}
