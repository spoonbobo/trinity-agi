# Per-user gateway token (generated by orchestrator)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw.name" . }}-token
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.gatewayToken | quote }}
